syntax = "proto3";

package crawler.v1;

import "google/protobuf/timestamp.proto";
import "validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "distributed-crawler/pkg/api/crawlergrpc";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Distributed Crawler API"
    version: "1.0.0"
    contact: {
      name: "Denis Miroshnichenko"
      email: ""
    };
  };

  host: "localhost:8080",
  schemes: HTTP,
  schemes: HTTPS,
  consumes: "application/json",
  produces: "application/json",
};

// AuthOptions contains authentication options for crawling
message AuthOptions {
  string cookie = 1;
  string basic_user = 2 [json_name = "basic_user"];
  string basic_password = 3 [json_name = "basic_password"];
  string bearer_token = 4 [json_name = "bearer_token"];
}

// RateLimitPolicy defines rate limiting configuration
message RateLimitPolicy {
  double rps = 3;
}

// RetryPolicy defines retry configuration
message RetryPolicy {
  uint64 max_attempts = 1 [json_name = "max_attempts"];
  uint64 backoff_initial_ms = 2 [json_name = "backoff_initial_ms"];
  double backoff_multiplier = 3 [json_name = "backoff_multiplier"];
}

// ScheduleOptions defines scheduling configuration
message ScheduleOptions {
  string cron = 1;
}

// ScopeRules defines crawling scope rules
message ScopeRules {
  uint64 max_depth = 1 [json_name = "max_depth"];
  repeated string allowed_domains = 2 [json_name = "allowed_domains"];
  repeated string deny_url_patterns = 3 [json_name = "deny_url_patterns"];
}

// Seed represents a starting URL
message Seed {
  string url = 1;
}

// ExtractorSpec defines how to extract a field
message ExtractorSpec {
  string selector = 1;
  string attribute = 2;
  bool multiple = 3;
  optional int32 index = 4;
}

// TransformSpec defines a transformation operation
message TransformSpec {
  string op = 1; // "trim" | "lower" | "upper" | "normalize_url" | "unique" | "limit" | "to_int" | "to_float" | "parse_price" | "html_to_text" | "collapse_ws" | "sha256"
  string arg = 2; // JSON-encoded argument
}

// FieldSpec defines a field to extract
message FieldSpec {
  string name = 1;
  string type = 2; // "string" | "int" | "float" | "bool" | "url" | "json"
  bool required = 3;
  ExtractorSpec extractor = 4;
  repeated TransformSpec transforms = 5;
}

// MetricSpec defines a metric to compute
message MetricSpec {
  string name = 1;
  string op = 2; // "len" | "count" | "word_count" | "field_present" | "status_is_error" | "count_external_links"
  string input = 3;
}

// ExtractionSpec defines extraction configuration
message ExtractionSpec {
  repeated FieldSpec fields = 1;
  repeated MetricSpec metrics = 2;
}

// CrawlJobConfig represents crawl job configuration
message CrawlJobConfig {
  string id = 1;
  string name = 2;
  ExtractionSpec extraction_spec = 3 [json_name = "extraction_spec"];
  ScopeRules scopes = 4;
  repeated Seed seeds = 5;
  RateLimitPolicy rate_limit = 6 [json_name = "rate_limit"];
  RetryPolicy retries = 7;
  AuthOptions auth = 8;
  ScheduleOptions schedule = 9;
}

// CrawlJob represents a crawling job
message CrawlJob {
  string id = 1;
  string job_config_id = 2 [json_name = "job_config_id"];
  optional CrawlJobConfig job_config = 3 [json_name = "job_config"];
  string status = 4;
  google.protobuf.Timestamp created_at = 5 [json_name = "created_at"];
  optional google.protobuf.Timestamp completed_at = 6 [json_name = "completed_at"];
  string error = 7; // JSON-encoded error map
}

// CrawlTask represents a single crawl task within a job
message CrawlTask {
  string id = 1;
  string job_id = 2 [json_name = "job_id"];
  optional CrawlJob job = 3;
  string url = 4;
  optional string final_url = 5 [json_name = "final_url"];
  string status = 6;
  google.protobuf.Timestamp enqueued_at = 7 [json_name = "enqueued_at"];
  uint64 depth = 8;
  string body_hash = 9 [json_name = "body_hash"];
  string minio_object_key = 10 [json_name = "minio_object_key"];
}

message ListJobsRequest {
  optional string status = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListJobsResponse {
  repeated CrawlJob jobs = 1;
}

message CreateJobRequest {
  CrawlJobConfig config = 1 [(validate.rules).message.required = true];
}

message CreateJobResponse {
  string id = 1;
}

message GetJobRequest {
  string id = 1;
}

message GetJobResponse {
  CrawlJob job = 1;
}

// Request/Response messages for Tasks

message CreateTaskRequest {
  string job_id = 1 [(validate.rules).string.min_len = 1];
  string url = 2 [(validate.rules).string.min_len = 1];
}

message GetTaskRequest {
  string id = 1;
}

message GetTaskResponse {
  CrawlTask task = 1;
}

message ListTasksByJobRequest {
  string job_id = 1;
}

message ListTasksByJobResponse {
  repeated CrawlTask tasks = 1;
}

// Preview messages

message Preview {
  string id = 1;
  string source_url = 2 [json_name = "source_url"];
  optional string final_url = 3 [json_name = "final_url"];
  string minio_key = 4 [json_name = "minio_key"];
  string content_type = 5 [json_name = "content_type"];
  string download_url = 6 [json_name = "download_url"];
  google.protobuf.Timestamp created_at = 7 [json_name = "created_at"];
  optional google.protobuf.Timestamp expires_at = 8 [json_name = "expires_at"];
}

message CreatePreviewRequest {
  string url = 1 [(validate.rules).string.min_len = 1];
}

message CreatePreviewResponse {
  string id = 1;
}

message GetPreviewRequest {
  string id = 1;
}

message GetPreviewResponse {
  Preview preview = 1;
}

// Auth messages

message RegisterRequest {
  string email = 1 [(validate.rules).string.email = true];
  string password = 2 [(validate.rules).string.min_len = 8];
}

message RegisterResponse {
  string access_token = 1 [json_name = "access_token"];
  string refresh_token = 2 [json_name = "refresh_token"];
  int32 expires_in = 3 [json_name = "expires_in"];
}

message LoginRequest {
  string email = 1 [(validate.rules).string.email = true];
  string password = 2 [(validate.rules).string.min_len = 1];
}

message LoginResponse {
  string access_token = 1 [json_name = "access_token"];
  string refresh_token = 2 [json_name = "refresh_token"];
  int32 expires_in = 3 [json_name = "expires_in"];
}

message RefreshRequest {
  string refresh_token = 1 [(validate.rules).string.min_len = 1, json_name = "refresh_token"];
}

message RefreshResponse {
  string access_token = 1 [json_name = "access_token"];
  string refresh_token = 2 [json_name = "refresh_token"];
  int32 expires_in = 3 [json_name = "expires_in"];
}

message LogoutRequest {
  string refresh_token = 1 [(validate.rules).string.min_len = 1, json_name = "refresh_token"];
}

message LogoutResponse {
  // Empty response
}
