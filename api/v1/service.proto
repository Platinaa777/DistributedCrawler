syntax = "proto3";

package crawler.v1;

import "v1/models.proto";
import "google/api/annotations.proto";

option go_package = "distributed-crawler/pkg/api/crawlergrpc";

// CrawlerService defines the gRPC service
service CrawlerService {
  // Job operations
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs"
    };
  }
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/jobs"
      body: "*"
    };
  }
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{id}"
    };
  }

  // Task operations
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/api/v1/tasks/{id}"
    };
  }
  rpc ListTasksByJob(ListTasksByJobRequest) returns (ListTasksByJobResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{job_id}/tasks"
    };
  }
}

// PreviewService defines the preview service for HTML inspection
service PreviewService {
  // Fetch URL, sanitize HTML, store in MinIO, return preview reference
  rpc CreatePreview(CreatePreviewRequest) returns (CreatePreviewResponse) {
    option (google.api.http) = {
      post: "/api/v1/previews"
      body: "*"
    };
  }

  // Return preview metadata with presigned download URL
  rpc GetPreview(GetPreviewRequest) returns (GetPreviewResponse) {
    option (google.api.http) = {
      get: "/api/v1/previews/{id}"
    };
  }
}
