syntax = "proto3";

package crawler.v1;

import "v1/models.proto";
import "google/api/annotations.proto";

option go_package = "distributed-crawler/pkg/api/crawlergrpc";

// CrawlerService defines the gRPC service
service CrawlerService {
  // Job operations
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs"
    };
  }
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/jobs"
      body: "*"
    };
  }
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{id}"
    };
  }
  // Get a presigned URL for downloading a job export file (JSON or CSV)
  rpc GetJobExportFileURL(GetJobExportFileURLRequest) returns (GetJobExportFileURLResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{job_id}/export-url"
    };
  }

  // Task operations
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/api/v1/tasks/{id}"
    };
  }
  rpc ListTasksByJob(ListTasksByJobRequest) returns (ListTasksByJobResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{job_id}/tasks"
    };
  }

  // Get aggregated task analytics for a job
  rpc GetTaskAnalytics(GetTaskAnalyticsRequest) returns (GetTaskAnalyticsResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{job_id}/analytics"
    };
  }

  // Get a presigned URL for downloading a task file (HTML page or JSON result)
  rpc GetTaskFileURL(GetTaskFileURLRequest) returns (GetTaskFileURLResponse) {
    option (google.api.http) = {
      get: "/api/v1/tasks/{task_id}/file-url"
    };
  }
}

// PreviewService defines the preview service for HTML inspection
service PreviewService {
  // Fetch URL, sanitize HTML, store in MinIO, return preview reference
  rpc CreatePreview(CreatePreviewRequest) returns (CreatePreviewResponse) {
    option (google.api.http) = {
      post: "/api/v1/previews"
      body: "*"
    };
  }

  // Return preview metadata with presigned download URL
  rpc GetPreview(GetPreviewRequest) returns (GetPreviewResponse) {
    option (google.api.http) = {
      get: "/api/v1/previews/{id}"
    };
  }
}

// AuthService defines authentication and authorization operations
service AuthService {
  // Register a new user
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register"
      body: "*"
    };
  }

  // Login with email and password
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }

  // Refresh access token using refresh token
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/refresh"
      body: "*"
    };
  }

  // Logout and revoke refresh token
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout"
      body: "*"
    };
  }
}

// UserService defines user management operations
service UserService {
  // List registered users
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/users"
    };
  }

  // Update user role (admin only)
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse) {
    option (google.api.http) = {
      patch: "/api/v1/users/{id}/role"
      body: "*"
    };
  }
}

// QueueAdminService provides CRUD for queue endpoints and routing rules.
service QueueAdminService {
  rpc ListQueueEndpoints(ListQueueEndpointsRequest) returns (ListQueueEndpointsResponse) {
    option (google.api.http) = {
      get: "/api/v1/queues"
    };
  }
  rpc CreateQueueEndpoint(CreateQueueEndpointRequest) returns (CreateQueueEndpointResponse) {
    option (google.api.http) = {
      post: "/api/v1/queues"
      body: "endpoint"
    };
  }
  rpc UpdateQueueEndpoint(UpdateQueueEndpointRequest) returns (UpdateQueueEndpointResponse) {
    option (google.api.http) = {
      patch: "/api/v1/queues/{endpoint.id}"
      body: "endpoint"
    };
  }
  rpc DeleteQueueEndpoint(DeleteQueueEndpointRequest) returns (DeleteQueueEndpointResponse) {
    option (google.api.http) = {
      delete: "/api/v1/queues/{id}"
    };
  }
  rpc ListQueueRoutingRules(ListQueueRoutingRulesRequest) returns (ListQueueRoutingRulesResponse) {
    option (google.api.http) = {
      get: "/api/v1/queue-routing"
    };
  }
  rpc UpsertQueueRoutingRules(UpsertQueueRoutingRulesRequest) returns (UpsertQueueRoutingRulesResponse) {
    option (google.api.http) = {
      put: "/api/v1/queue-routing"
      body: "rule"
    };
  }
}

// WorkerService defines worker monitoring and control operations
service WorkerService {
  // Bidirectional stream for worker heartbeats and control commands
  rpc WorkerStream(stream WorkerHeartbeat) returns (stream WorkerCommand);

  // List registered workers for monitoring UI
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse) {
    option (google.api.http) = {
      get: "/api/v1/workers"
    };
  }

  // Trigger graceful drain for a worker
  rpc DrainWorker(DrainWorkerRequest) returns (DrainWorkerResponse) {
    option (google.api.http) = {
      post: "/api/v1/workers/{worker_id}:drain"
      body: "*"
    };
  }

  // Trigger force kill for a worker
  rpc ForceKillWorker(ForceKillWorkerRequest) returns (ForceKillWorkerResponse) {
    option (google.api.http) = {
      post: "/api/v1/workers/{worker_id}:force-kill"
      body: "*"
    };
  }
}
