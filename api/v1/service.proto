syntax = "proto3";

package crawler.v1;

import "v1/models.proto";
import "google/api/annotations.proto";

option go_package = "distributed-crawler/pkg/api/crawlergrpc";

// CrawlerService defines the gRPC service
service CrawlerService {
  // Job operations
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs"
    };
  }
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/jobs"
      body: "*"
    };
  }
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{id}"
    };
  }
  rpc UpdateJob(UpdateJobRequest) returns (UpdateJobResponse) {
    option (google.api.http) = {
      patch: "/api/v1/jobs/{id}"
      body: "*"
    };
  }

  // Task operations
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse) {
    option (google.api.http) = {
      post: "/api/v1/tasks"
      body: "*"
    };
  }
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/api/v1/tasks/{id}"
    };
  }
  rpc ListTasksByJob(ListTasksByJobRequest) returns (ListTasksByJobResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{job_id}/tasks"
    };
  }
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse) {
    option (google.api.http) = {
      patch: "/api/v1/tasks/{id}"
      body: "*"
    };
  }

  // Snapshot operations
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse) {
    option (google.api.http) = {
      post: "/api/v1/snapshots"
      body: "*"
    };
  }
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse) {
    option (google.api.http) = {
      get: "/api/v1/snapshots/{id}"
    };
  }
  rpc ListSnapshotsByTask(ListSnapshotsByTaskRequest) returns (ListSnapshotsByTaskResponse) {
    option (google.api.http) = {
      get: "/api/v1/tasks/{task_id}/snapshots"
    };
  }

  // Record operations
  rpc CreateRecord(CreateRecordRequest) returns (CreateRecordResponse) {
    option (google.api.http) = {
      post: "/api/v1/records"
      body: "*"
    };
  }
  rpc GetRecord(GetRecordRequest) returns (GetRecordResponse) {
    option (google.api.http) = {
      get: "/api/v1/records/{id}"
    };
  }
  rpc ListRecordsByTask(ListRecordsByTaskRequest) returns (ListRecordsByTaskResponse) {
    option (google.api.http) = {
      get: "/api/v1/tasks/{task_id}/records"
    };
  }
}
