<div class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
  <header *ngIf="isAuthenticated" class="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 transition-colors duration-200">
    <div class="container mx-auto px-6 h-16 flex items-center justify-between">
      <div class="text-lg font-semibold text-gray-900 dark:text-white">Distributed Crawler</div>
      <div class="flex items-center gap-2">
        <p-button
          [text]="true"
          [rounded]="true"
          (onClick)="toggleTheme()"
          styleClass="!w-10 !h-10 flex items-center justify-center"
          [attr.aria-label]="themeService.isDark ? 'Switch to light mode' : 'Switch to dark mode'">
          <i [class]="themeService.isDark ? 'pi pi-sun text-yellow-400' : 'pi pi-moon text-gray-600'"></i>
        </p-button>
        <p-button
          [text]="true"
          (onClick)="menu.toggle($event)"
          styleClass="flex items-center gap-2">
          <i class="pi pi-user"></i>
          <span class="flex flex-col items-start leading-tight">
            <span class="text-sm font-medium text-gray-900 dark:text-white">My account</span>
            <span *ngIf="accountEmail" class="text-xs text-gray-500 dark:text-gray-400">{{ accountEmail }}</span>
          </span>
          <i class="pi pi-chevron-down text-xs"></i>
        </p-button>
        <p-menu #menu [model]="menuItems" [popup]="true">
          <ng-template pTemplate="start">
            <div *ngIf="accountEmail" class="px-4 py-2 text-xs text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700">{{ accountEmail }}</div>
          </ng-template>
        </p-menu>
      </div>
    </div>
  </header>
  <router-outlet />
</div>
