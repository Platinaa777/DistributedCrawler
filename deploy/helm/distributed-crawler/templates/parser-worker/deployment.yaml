{{- if .Values.parserWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distributed-crawler.parserWorker.fullname" . }}
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.parserWorker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.parserWorker.autoscaling.enabled }}
  replicas: {{ .Values.parserWorker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "distributed-crawler.parserWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.parserWorker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "distributed-crawler.parserWorker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "distributed-crawler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.parserWorker.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "distributed-crawler.waitForService" (dict "root" . "name" "postgresql" "host" (include "distributed-crawler.postgresHost" .) "port" .Values.config.postgres.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" . "name" "rabbitmq" "host" (include "distributed-crawler.rabbitmqHost" .) "port" .Values.config.rabbitmq.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" . "name" "minio" "host" (include "distributed-crawler.minioHost" .) "port" .Values.config.minio.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" . "name" "redis" "host" (include "distributed-crawler.redisHost" .) "port" .Values.config.redis.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" . "name" "grpc-server" "host" (include "distributed-crawler.grpcServer.host" .) "port" .Values.grpcServer.service.grpcPort) | nindent 8 }}
      containers:
        - name: parser-worker
          securityContext:
            {{- toYaml .Values.parserWorker.securityContext | nindent 12 }}
          image: {{ include "distributed-crawler.image" (dict "imageRoot" .Values.parserWorker.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.parserWorker.image.pullPolicy }}
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "distributed-crawler.configMapName" . }}
            - secretRef:
                name: {{ include "distributed-crawler.secretName" . }}
          resources:
            {{- toYaml .Values.parserWorker.resources | nindent 12 }}
          volumeMounts:
            {{- include "distributed-crawler.queueSecretsVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "distributed-crawler.queueSecretsVolume" . | nindent 8 }}
      {{- with .Values.parserWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.parserWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.parserWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
