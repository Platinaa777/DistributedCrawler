{{- if .Values.parserWorker.enabled }}
{{- $root := . }}
{{- $deployments := list "" }}
{{- if .Values.parserWorker.regions }}
{{- $deployments = .Values.parserWorker.regions }}
{{- end }}
{{- range $i, $region := $deployments }}
{{- if $i }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ if $region }}{{ printf "%s-%s" (include "distributed-crawler.parserWorker.fullname" $root) $region | trunc 63 | trimSuffix "-" }}{{ else }}{{ include "distributed-crawler.parserWorker.fullname" $root }}{{ end }}
  namespace: {{ include "distributed-crawler.namespace" $root }}
  labels:
    {{- include "distributed-crawler.parserWorker.labels" $root | nindent 4 }}
    {{- if $region }}
    worker-region: {{ $region | quote }}
    {{- end }}
spec:
  {{- if not $root.Values.parserWorker.autoscaling.enabled }}
  replicas: {{ $root.Values.parserWorker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "distributed-crawler.parserWorker.selectorLabels" $root | nindent 6 }}
      {{- if $region }}
      worker-region: {{ $region | quote }}
      {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $root | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") $root | sha256sum }}
        {{- with $root.Values.parserWorker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "distributed-crawler.parserWorker.selectorLabels" $root | nindent 8 }}
        {{- if $region }}
        worker-region: {{ $region | quote }}
        {{- end }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "distributed-crawler.serviceAccountName" $root }}
      securityContext:
        {{- toYaml $root.Values.parserWorker.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "distributed-crawler.waitForService" (dict "root" $root "name" "postgresql" "host" (include "distributed-crawler.postgresHost" $root) "port" $root.Values.config.postgres.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" $root "name" "rabbitmq" "host" (include "distributed-crawler.rabbitmqHost" $root) "port" $root.Values.config.rabbitmq.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" $root "name" "minio" "host" (include "distributed-crawler.minioHost" $root) "port" $root.Values.config.minio.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" $root "name" "redis" "host" (include "distributed-crawler.redisHost" $root) "port" $root.Values.config.redis.port) | nindent 8 }}
        {{- include "distributed-crawler.waitForService" (dict "root" $root "name" "grpc-server" "host" (include "distributed-crawler.grpcServer.host" $root) "port" $root.Values.grpcServer.service.grpcPort) | nindent 8 }}
      containers:
        - name: parser-worker
          securityContext:
            {{- toYaml $root.Values.parserWorker.securityContext | nindent 12 }}
          image: {{ include "distributed-crawler.image" (dict "imageRoot" $root.Values.parserWorker.image "global" $root.Values.global) | quote }}
          imagePullPolicy: {{ $root.Values.parserWorker.image.pullPolicy }}
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if $region }}
            - name: WORKER_REGION
              value: {{ $region | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "distributed-crawler.configMapName" $root }}
            - secretRef:
                name: {{ include "distributed-crawler.secretName" $root }}
          resources:
            {{- toYaml $root.Values.parserWorker.resources | nindent 12 }}
          volumeMounts:
            {{- include "distributed-crawler.queueSecretsVolumeMount" $root | nindent 12 }}
      volumes:
        {{- include "distributed-crawler.queueSecretsVolume" $root | nindent 8 }}
      {{- with $root.Values.parserWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.parserWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.parserWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
