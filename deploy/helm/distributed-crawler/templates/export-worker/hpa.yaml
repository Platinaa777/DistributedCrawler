{{- if and .Values.exportWorker.enabled .Values.exportWorker.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "distributed-crawler.exportWorker.fullname" . }}
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.exportWorker.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "distributed-crawler.exportWorker.fullname" . }}
  minReplicas: {{ .Values.exportWorker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.exportWorker.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.exportWorker.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.exportWorker.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
{{- end }}
