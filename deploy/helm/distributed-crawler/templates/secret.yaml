{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "distributed-crawler.secretName" . }}
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.labels" . | nindent 4 }}
type: Opaque
data:
  # PostgreSQL password
  PG_PASSWORD: {{ .Values.secrets.postgres.password | b64enc | quote }}

  # RabbitMQ password
  RABBITMQ_PASSWORD: {{ .Values.secrets.rabbitmq.password | b64enc | quote }}

  # MinIO credentials
  MINIO_USER: {{ .Values.secrets.minio.user | b64enc | quote }}
  MINIO_PWD: {{ .Values.secrets.minio.password | b64enc | quote }}

  # Redis password
  REDIS_PWD: {{ .Values.secrets.redis.password | b64enc | quote }}

  # Constructed DSN for PostgreSQL
  PG_DSN: {{ printf "postgres://%s:%s@%s:%d/%s?sslmode=%s" .Values.config.postgres.user .Values.secrets.postgres.password (include "distributed-crawler.postgresHost" .) (int .Values.config.postgres.port) .Values.config.postgres.database .Values.config.postgres.sslMode | b64enc | quote }}

  # Constructed URL for RabbitMQ
  RABBITMQ_URL: {{ printf "amqp://%s:%s@%s:%d/" .Values.config.rabbitmq.user .Values.secrets.rabbitmq.password (include "distributed-crawler.rabbitmqHost" .) (int .Values.config.rabbitmq.port) | b64enc | quote }}

  # Redis address
  REDIS_ADDRESS: {{ printf "%s:%d" (include "distributed-crawler.redisHost" .) (int .Values.config.redis.port) | b64enc | quote }}

  # Auth secrets
  JWT_SECRET: {{ .Values.secrets.auth.jwtSecret | b64enc | quote }}
  DEFAULT_USER_PWD: {{ .Values.secrets.auth.defaultPassword | b64enc | quote }}

  # Queue secrets file content (mounted at QUEUE_SECRETS_FILE_PATH)
  queue-secrets.json: {{ .Values.secrets.queueSecrets.content | b64enc | quote }}
{{- end }}
