{{- if and .Values.grpcServer.enabled .Values.grpcServer.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "distributed-crawler.grpcServer.fullname" . }}
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.grpcServer.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "distributed-crawler.grpcServer.fullname" . }}
  minReplicas: {{ .Values.grpcServer.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.grpcServer.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.grpcServer.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.grpcServer.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.grpcServer.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.grpcServer.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
