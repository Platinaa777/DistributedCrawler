{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "distributed-crawler.fullname" . }}-migrations
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "distributed-crawler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "distributed-crawler.serviceAccountName" . }}
      restartPolicy: Never
      initContainers:
        {{- include "distributed-crawler.waitForService" (dict "root" . "name" "postgresql" "host" (include "distributed-crawler.postgresHost" .) "port" .Values.config.postgres.port) | nindent 8 }}
      containers:
        - name: migrations
          image: {{ include "distributed-crawler.image" (dict "imageRoot" .Values.migrations.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command:
            - /app/migrate
            - up
          envFrom:
            - configMapRef:
                name: {{ include "distributed-crawler.configMapName" . }}
            - secretRef:
                name: {{ include "distributed-crawler.secretName" . }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
