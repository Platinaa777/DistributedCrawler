{{- if .Values.fetchWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distributed-crawler.fetchWorker.fullname" . }}
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.fetchWorker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.fetchWorker.autoscaling.enabled }}
  replicas: {{ .Values.fetchWorker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "distributed-crawler.fetchWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.fetchWorker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "distributed-crawler.fetchWorker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "distributed-crawler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.fetchWorker.podSecurityContext | nindent 8 }}
      containers:
        - name: fetch-worker
          securityContext:
            {{- toYaml .Values.fetchWorker.securityContext | nindent 12 }}
          image: "{{ .Values.fetchWorker.image.repository }}:{{ .Values.fetchWorker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.fetchWorker.image.pullPolicy }}
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "distributed-crawler.configMapName" . }}
            - secretRef:
                name: {{ include "distributed-crawler.secretName" . }}
          resources:
            {{- toYaml .Values.fetchWorker.resources | nindent 12 }}
      {{- with .Values.fetchWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fetchWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fetchWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
