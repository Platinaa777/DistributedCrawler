{{- if and .Values.fetchWorker.enabled .Values.fetchWorker.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "distributed-crawler.fetchWorker.fullname" . }}
  namespace: {{ include "distributed-crawler.namespace" . }}
  labels:
    {{- include "distributed-crawler.fetchWorker.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "distributed-crawler.fetchWorker.fullname" . }}
  minReplicas: {{ .Values.fetchWorker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.fetchWorker.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.fetchWorker.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.fetchWorker.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
{{- end }}
