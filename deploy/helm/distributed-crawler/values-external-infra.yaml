# App chart overlay for using a separate infra Helm release.
#
# Usage:
#   helm upgrade --install crawler ./deploy/helm/distributed-crawler \
#     -f values.yaml \
#     -f values-dev.yaml \
#     -f values-external-infra.yaml

infra:
  releaseName: "infra"
  namespace: "infra"

config:
  otel:
    enabled: true
    exporterInsecure: true

  opensearch:
    enabled: true

secrets:
  postgres:
    password: "some-pwd-123"

  rabbitmq:
    password: "guest"

  minio:
    user: "minioadmin"
    password: "minioadmin"

  redis:
    password: "some_redis_pwd_123"
