# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []

# Common labels and annotations
commonLabels: {}
commonAnnotations: {}

# Namespace to deploy to (if not set, uses release namespace)
namespaceOverride: ""

# Infrastructure release to target for PostgreSQL, RabbitMQ, MinIO, Redis,
# OTel Collector, and OpenSearch. When omitted, the app release name and
# namespace are used for service discovery.
infra:
  releaseName: ""
  namespace: ""

# =============================================================================
# gRPC Server Configuration
# =============================================================================
grpcServer:
  enabled: true
  replicaCount: 1
  hostOverride: ""

  image:
    repository: distributed-crawler/grpc-server
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    grpcPort: 8083
    httpPort: 8084

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: crawler-api.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Fetch Worker Configuration
# =============================================================================
fetchWorker:
  enabled: true
  replicaCount: 2
  # regions is a list of WORKER_REGION values. One Deployment is created per entry,
  # each running replicaCount replicas with WORKER_REGION set to that value.
  # Leave empty to create a single Deployment with no WORKER_REGION (default region).
  # Example: ["us-east", "eu-west"]
  regions: []

  image:
    repository: distributed-crawler/fetch-worker
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =============================================================================
# Parser Worker Configuration
# =============================================================================
parserWorker:
  enabled: true
  replicaCount: 2
  # regions is a list of WORKER_REGION values. One Deployment is created per entry,
  # each running replicaCount replicas with WORKER_REGION set to that value.
  # Leave empty to create a single Deployment with no WORKER_REGION (default region).
  # Example: ["us-east", "eu-west"]
  regions: []

  image:
    repository: distributed-crawler/parser-worker
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =============================================================================
# Export Worker Configuration
# =============================================================================
exportWorker:
  enabled: true
  replicaCount: 1

  image:
    repository: distributed-crawler/export-worker
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =============================================================================
# UI (Angular frontend) Configuration
# =============================================================================
ui:
  enabled: true
  replicaCount: 1

  image:
    repository: distributed-crawler/ui
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: crawler.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101  # nginxinc/nginx-unprivileged default uid
    fsGroup: 101

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# =============================================================================
# Application Configuration
# =============================================================================
config:
  # PostgreSQL connection
  postgres:
    host: ""  # If empty, uses subchart service name
    port: 5432
    database: crawler
    user: crawler
    # password is in secrets
    sslMode: disable

  # RabbitMQ connection
  rabbitmq:
    host: ""  # If empty, uses subchart service name
    port: 5672
    user: guest
    # password is in secrets
    crawlQueueName: crawl_queue
    crawlQueueNames: ""  # comma-separated list for multi-region; falls back to crawlQueueName when empty
    parsingQueueName: parsing_queue
    exportQueueName: export_queue

  # MinIO/S3 connection
  minio:
    endpoint: ""  # If empty, uses subchart service name
    port: 9000
    useSSL: false
    bucketName: pages
    publicBaseURL: ""  # If set, presigned URLs use this base (e.g. http://localhost:9000 for minikube)
    # user and password are in secrets

  # Redis connection
  redis:
    host: ""  # If empty, uses subchart service name
    port: 6379
    db: 0
    # password is in secrets

  # Logging
  log:
    level: info
    env: production

  # Auth / JWT
  auth:
    accessTokenTTL: "15m"
    refreshTokenTTL: "720h"
    issuer: "distributed-crawler"
    audience: "api"
    defaultUserEmail: "admin@example.com"

  # OpenTelemetry
  otel:
    enabled: false
    serviceName: "distributed-crawler"
    serviceVersion: "1.0.0"
    environment: "production"
    exporterEndpoint: ""
    exporterInsecure: true
    traceSampleRate: 1.0
    metricsIntervalSeconds: 15

  # OpenSearch log shipping
  opensearch:
    enabled: false
    endpoint: ""
    index: "app-logs"
    flushIntervalSeconds: 5
    batchSize: 100

  # Messaging broker selection: rabbitmq | kafka | grpc_memory
  messaging:
    broker: "rabbitmq"

  # Rate limiter: redis | inmemory
  limiterType: "redis"

  # Kafka configuration (used when messaging.broker=kafka)
  kafka:
    brokers: "kafka:9092"
    consumerGroup: "distributed-crawler"
    crawlTopicName: "crawl_queue"
    parsingTopicName: "parsing_queue"

  # Memory broker (used when messaging.broker=grpc_memory)
  memoryBroker:
    addr: ":9095"
    capacity: 1000

  # Queue secrets file store
  queueSecrets:
    filePath: "/etc/crawler/queue-secrets.json"
    watchEnabled: "true"
    reloadInterval: "60s"

  # CORS allowed origins (comma-separated)
  corsAllowedOrigins: "http://localhost:4200"

# =============================================================================
# Secrets Configuration
# =============================================================================
secrets:
  # Set to true to create secrets from values
  create: true
  # Alternatively, provide existing secret names
  existingSecret: ""

  postgres:
    password: "changeme-postgres-password"

  rabbitmq:
    password: "guest"

  minio:
    user: "minioadmin"
    password: "changeme-minio-password"

  redis:
    password: "changeme-redis-password"

  auth:
    jwtSecret: "changeme-jwt-secret-min-32-chars-long"
    defaultPassword: "changeme-admin-password"

  queueSecrets:
    content: '{}'

# =============================================================================
# Database Migrations Job
# =============================================================================
migrations:
  enabled: true

  image:
    repository: distributed-crawler/grpc-server
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# =============================================================================
# PostgreSQL Subchart Configuration
# =============================================================================
postgresql:
  enabled: true

  auth:
    username: crawler
    password: ""  # Will use secret
    database: crawler
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password

  primary:
    persistence:
      enabled: true
      size: 10Gi

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# =============================================================================
# RabbitMQ Subchart Configuration
# =============================================================================
rabbitmq:
  enabled: true

  auth:
    username: guest
    password: ""  # Will use secret
    existingPasswordSecret: ""

  persistence:
    enabled: true
    size: 8Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# MinIO Subchart Configuration
# =============================================================================
minio:
  enabled: true

  auth:
    rootUser: minioadmin
    rootPassword: ""  # Will use secret
    existingSecret: ""

  defaultBuckets: "pages"

  persistence:
    enabled: true
    size: 20Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# Redis Subchart Configuration
# =============================================================================
redis:
  enabled: true

  auth:
    enabled: true
    password: ""  # Will use secret
    existingSecret: ""
    existingSecretPasswordKey: redis-password

  master:
    persistence:
      enabled: true
      size: 8Gi

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  replica:
    replicaCount: 0

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# =============================================================================
# Network Policies
# =============================================================================
networkPolicy:
  enabled: false

# =============================================================================
# Dependency Waiter Init Containers
# =============================================================================
dependencyWaiter:
  image:
    repository: busybox
    tag: "1.36.1"
    pullPolicy: IfNotPresent
  pollIntervalSeconds: 2
