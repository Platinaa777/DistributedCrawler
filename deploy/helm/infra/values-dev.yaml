# =============================================================================
# Infrastructure – Development overrides
# =============================================================================
# Minimal resources, small storage. Prometheus/Grafana/OpenSearch disabled
# to keep resource usage low – use Jaeger UI directly for traces.
# =============================================================================

postgresql:
  persistence:
    size: 1Gi
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

rabbitmq:
  persistence:
    size: 1Gi
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 100m
      memory: 512Mi

minio:
  persistence:
    size: 5Gi
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

redis:
  persistence:
    size: 1Gi
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

redisinsight:
  enabled: true

otelcollector:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

jaeger:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

prometheus:
  enabled: true

grafana:
  enabled: true

opensearch:
  enabled: true
  persistence:
    size: 2Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

opensearch-dashboards:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
