# =============================================================================
# Infrastructure Helm Chart – Default Values
# =============================================================================
# Uses the same Docker images as docker-compose.yaml.
# No subchart dependencies – all resources are plain Kubernetes manifests.
#
# Service DNS names derived from the Helm release name (default: "infra"):
#   postgresql          → <release>-postgresql:5432
#   rabbitmq            → <release>-rabbitmq:5672  (management: 15672)
#   minio               → <release>-minio:9000     (console: 9001)
#   redis               → <release>-redis-master:6379
#   otel-collector      → <release>-otelcollector:4317
#   jaeger (collector)  → <release>-jaeger-all-in-one:4317
#   jaeger (UI)         → <release>-jaeger-query:16686
#   prometheus          → <release>-prometheus:9090
#   grafana             → <release>-grafana:3000
#   opensearch          → <release>-opensearch:9200
#   opensearch-dashboards → <release>-opensearch-dashboards:5601
# =============================================================================

# =============================================================================
# PostgreSQL  (image: postgres:14-alpine3.17)
# =============================================================================
postgresql:
  enabled: true

  image:
    repository: postgres
    tag: "14-alpine3.17"

  auth:
    username: crawler
    password: "changeme-postgres-password"
    database: crawler

  persistence:
    size: 10Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# RabbitMQ  (image: rabbitmq:4.2.2-management)
# =============================================================================
rabbitmq:
  enabled: true

  image:
    repository: rabbitmq
    tag: "4.2.2-management"

  auth:
    username: guest
    password: "changeme-rabbitmq-password"

  persistence:
    size: 8Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# MinIO  (image: minio/minio:RELEASE.2025-07-23T15-54-02Z)
# NOTE: Create the "pages" bucket manually after first deploy – see NOTES.txt
# =============================================================================
minio:
  enabled: true

  image:
    repository: minio/minio
    tag: "RELEASE.2025-07-23T15-54-02Z"

  auth:
    rootUser: minioadmin
    rootPassword: "changeme-minio-password"

  persistence:
    size: 20Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# Redis  (image: redis:7.4-alpine)
# =============================================================================
redis:
  enabled: true

  image:
    repository: redis
    tag: "7.4-alpine"

  auth:
    password: "changeme-redis-password"

  persistence:
    size: 8Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# RedisInsight  (image: redis/redisinsight:2.46.0)
# =============================================================================
redisinsight:
  enabled: true

  image:
    repository: redis/redisinsight
    tag: "2.46.0"

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# =============================================================================
# Jaeger all-in-one  (image: jaegertracing/all-in-one:1.50.0)
# Collector OTLP gRPC: <release>-jaeger-all-in-one:4317
# Query UI:            <release>-jaeger-query:16686
# =============================================================================
jaeger:
  enabled: true

  image:
    repository: jaegertracing/all-in-one
    tag: "1.50.0"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# =============================================================================
# OpenTelemetry Collector  (image: otel/opentelemetry-collector-contrib:0.123.0)
# Jaeger endpoint is derived from .Release.Name automatically.
# =============================================================================
otelcollector:
  enabled: true

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.123.0"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# =============================================================================
# Prometheus  (image: prom/prometheus:v3.2.1)
# Scrapes the OTel collector metrics endpoint automatically.
# =============================================================================
prometheus:
  enabled: true

  image:
    repository: prom/prometheus
    tag: "v3.2.1"

  persistence:
    size: 10Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# Grafana  (image: grafana/grafana:11.5.2)
# Prometheus and Jaeger datasources are provisioned automatically.
# =============================================================================
grafana:
  enabled: true

  image:
    repository: grafana/grafana
    tag: "11.5.2"

  auth:
    adminUser: admin
    adminPassword: "changeme-grafana-password"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# OpenSearch  (image: opensearchproject/opensearch:2.19.1)
# Security plugin disabled – suitable for internal/dev use only.
# Requires privileged initContainer to set vm.max_map_count=262144.
# =============================================================================
opensearch:
  enabled: true

  image:
    repository: opensearchproject/opensearch
    tag: "2.19.1"

  javaOpts: "-Xms512m -Xmx512m"

  persistence:
    size: 10Gi

  resources:
    limits:
      cpu: "1000m"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

# =============================================================================
# OpenSearch Dashboards  (image: opensearchproject/opensearch-dashboards:2.19.1)
# Points to <release>-opensearch:9200 automatically.
# =============================================================================
opensearch-dashboards:
  enabled: true

  image:
    repository: opensearchproject/opensearch-dashboards
    tag: "2.19.1"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
