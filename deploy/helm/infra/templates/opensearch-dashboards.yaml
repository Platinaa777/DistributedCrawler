{{- if index .Values "opensearch-dashboards" "enabled" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-opensearch-dashboards
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: opensearch-dashboards
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: opensearch-dashboards
    spec:
      containers:
        - name: opensearch-dashboards
          image: {{ index .Values "opensearch-dashboards" "image" "repository" }}:{{ index .Values "opensearch-dashboards" "image" "tag" }}
          imagePullPolicy: {{ index .Values "opensearch-dashboards" "image" "pullPolicy" | default "IfNotPresent" }}
          env:
            - name: OPENSEARCH_HOSTS
              value: {{ printf "[\"http://%s-opensearch:9200\"]" .Release.Name | quote }}
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
          ports:
            - name: http
              containerPort: 5601
          resources:
            {{- index .Values "opensearch-dashboards" "resources" | toYaml | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opensearch-dashboards
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-dashboards
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
{{- end }}
