{{- if .Values.jaeger.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jaeger
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: jaeger
    spec:
      containers:
        - name: jaeger
          image: {{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: http-collector
              containerPort: 14268
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
---
# "jaeger-all-in-one" is the OTLP gRPC collector endpoint referenced by otel-collector
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jaeger-all-in-one
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: http-collector
      port: 14268
      targetPort: 14268
---
# "jaeger-query" is the UI endpoint referenced by Grafana datasource
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jaeger-query
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
{{- end }}
