{{- if .Values.redisinsight.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redisinsight
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: redisinsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redisinsight
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: redisinsight
    spec:
      containers:
        - name: redisinsight
          image: {{ .Values.redisinsight.image.repository }}:{{ .Values.redisinsight.image.tag }}
          ports:
            - name: http
              containerPort: 5540
          resources:
            {{- toYaml .Values.redisinsight.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redisinsight
  namespace: {{ include "distributed-crawler-infra.namespace" . }}
  labels:
    {{- include "distributed-crawler-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: redisinsight
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: redisinsight
  ports:
    - name: http
      port: 5540
      targetPort: 5540
{{- end }}
