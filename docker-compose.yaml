volumes:
  postgres_volume:
  rabbitmq_data:
  minio-data:
  redis_data:
  jaeger_data:

services:
  pg:
    image: postgres:14-alpine3.17
    environment:
      - "POSTGRES_DB=${PG_DATABASE_NAME}"
      - "POSTGRES_USER=${PG_USER}"
      - "POSTGRES_PASSWORD=${PG_PASSWORD}"
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4.2.2-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # UI (management)
    environment:
      - "RABBITMQ_DEFAULT_USER=${RMQ_USER}"
      - "RABBITMQ_DEFAULT_PASS=${RMQ_PWD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - "MINIO_ROOT_USER=${MINIO_USER}"
      - "MINIO_ROOT_PASSWORD=${MINIO_PWD}"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PWD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PWD}
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:2.46.0
    container_name: redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.67
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger HTTP collector
    volumes:
      - jaeger_data:/badger
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8889:8889"    # Prometheus exporter
      - "13133:13133"  # Health check
      - "55679:55679"  # zPages
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - jaeger
    restart: unless-stopped