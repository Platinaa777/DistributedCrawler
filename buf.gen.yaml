version: v2

managed:
  enabled: true

plugins:
  - local: protoc-gen-go
    out: pkg
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: pkg
    opt:
      - paths=source_relative

  - local: protoc-gen-grpc-gateway
    out: pkg
    opt:
      - paths=source_relative

  - local: protoc-gen-validate
    out: pkg
    opt:
      - paths=source_relative
      - lang=go

  - local: protoc-gen-openapiv2
    out: api/v1/swagger
    opt:
      - allow_merge=true
      - merge_file_name=api

inputs:
  - directory: api
